# implementation-plan.yml — Structured batch execution plan
# Written by phase 30 (plan). Read by implement, integrate, player-flow, stabilize.

game: "RunBench"
gdd_type: "additive"
total_batches: 8
total_features: 17
new_files: 18
modified_files: 6

viewport_budget:
  default:
    hud_top_px: 48
    canvas_play_area_px: 732
    dom_reserved_top: 0
    dom_reserved_bottom: 64
    logo_within_reserved: 32
    total_screen: 844
    note: "390x844 portrait; HUD top bar 48px + 732px play area + 64px reserved (32px logo) = 844px"

resolved_questions:
  - question: "What are the FPS thresholds that define performance tiers?"
    decision: "Excellent >=55fps, Good >=45fps, Fair >=30fps, Low <30fps"
    rationale: >
      Thresholds derived from standard mobile GPU capability tiers (high-end, mid-range,
      budget, low-end). Aligns with 60fps target device profile. Values are hard-coded
      constants in PerfTracker.ts; secondary pass may tune from real device data.

  - question: "Does PauseOverlay need to be suppressed or left inert for RunBench?"
    decision: "Leave PauseOverlay rendered but never trigger it — RunBench game state never emits a pause action"
    rationale: >
      GDD states 'no pause button by design'. Guardrail #8 forbids modifying src/core/.
      PauseOverlay is core-managed; the correct approach is to never emit a pause trigger
      from the RunBench GameController. PauseOverlay renders but has no activation path.

  - question: "How should deviceId_hash be computed for the run seed formula?"
    decision: "Generate a random 32-bit integer on first visit, persist to localStorage under key 'runbench-device-id'; read on subsequent visits"
    rationale: >
      Hash of User-Agent is non-unique (shared devices, same browser model). Canvas
      fingerprint adds latency. A random value persisted to localStorage is deterministic
      per device after first visit, simple to implement, and avoids fingerprinting concerns.
      Fallback: if localStorage unavailable, use 0 (seed degrades to runNumber * 48271).

preserve_list: []
# Additive GDD on greenfield stub — nothing to preserve from existing mygame/ stub beyond
# the contract shape (setupGame / setupStartScreen exports from index.ts).

batches:

  # =============================================================================
  # BATCH 1 — P0 — ECS Plugin + GameController Foundation
  # Player sees: dark canvas on screen, Pixi initialized, no crash, layer hierarchy live
  # This is the critical integration point; all gameplay depends on it.
  # =============================================================================
  - id: 1
    name: "GameController Foundation — Pixi init + ECS wiring"
    priority: P0
    player_visible: "player sees a dark canvas fill the screen; no DOM flash, no crash"
    features: [game-controller-pixi]
    cos_covered: [core-interaction, canvas, animated-dynamics, scoring]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [full-canvas]
      feedback_surfaces: [canvas]
    acceptance:
      - given: "GameScreen mounts and setupGame is called"
        should: "Pixi Application initializes with gameMode:pixi; canvas appended to container; no error thrown"
      - given: "GameController.init() completes"
        should: "ECS database created from RunBenchPlugin; setActiveDb(db) called; bridgeEcsToSignals wired"
      - given: "GameController.destroy() called"
        should: "GSAP tweens killed, Pixi app destroyed, ECS bridge cleaned up, setActiveDb(null) called — in that exact order"
      - given: "Pixi app is initialized"
        should: "Stage eventMode='static'; bg layer eventMode='none'; game layer eventMode='passive'; ui layer eventMode='passive'"
    test_loci:
      - describe: "GameController: init and destroy lifecycle"
        file: "src/game/runbench/GameController.test.ts"
        cases:
          - "Pixi Application initializes with gameMode:pixi; canvas appended to container; no error thrown"
          - "ECS database created from RunBenchPlugin; setActiveDb(db) called; bridgeEcsToSignals wired"
          - "GSAP tweens killed, Pixi app destroyed, ECS bridge cleaned up, setActiveDb(null) called — in that exact order"
          - "Stage eventMode='static'; bg layer eventMode='none'; game layer eventMode='passive'; ui layer eventMode='passive'"
    files:
      state:
        - src/game/runbench/state/RunBenchPlugin.ts
      integration:
        - src/game/runbench/GameController.ts
        - src/game/runbench/index.ts
        - src/game/mygame/screens/gameController.ts
        - src/game/mygame/index.ts
      test:
        - src/game/runbench/GameController.test.ts
    how:
      - "Create src/game/runbench/GameController.ts: export setupGame with gameMode:'pixi'; init Pixi Application (resizeTo container, resolution=Math.min(devicePixelRatio,2)); create layer hierarchy (bg, game, hud, ui containers on stage); update src/game/mygame/screens/gameController.ts to re-export from runbench ('export { setupGame } from \"~/game/runbench/GameController\"')"
      - "Create RunBenchPlugin.ts as ECS plugin with resource definitions (distance:number, fps:number, fpsAverage:number, phase:'idle'|'playing'|'dying'); wire setActiveDb(db) and bridgeEcsToSignals in init; destroy in exact order: GSAP.killTweensOf(stage) → app.destroy() → cleanupObserve?.() → setActiveDb(null)"
      - "Create src/game/runbench/index.ts: export { setupGame } from './GameController'; export { setupStartScreen } from './screens/startView' (stub startView in runbench for now); update src/game/mygame/index.ts to re-export from runbench paths"
    risk: HIGH
    risk_reason: "Central integration point — Pixi init, ECS wiring, layer hierarchy, destruction order must all be correct before any gameplay can be added"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (GameController.ts + index.ts)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for cos_covered (canvas: canvas renders; core-interaction: event modes set correctly)"
      - "touch targets ≥ 44 px and feedback surfaces present per ux_zones"
      - "screen root elements consume reserved_top_px=0 / reserved_bottom_px=64 as padding (logo zone clear)"
      - "bun run build + bun test pass within 3 fix cycles"
      - "destruction order verified: GSAP → Pixi → ECS bridge → setActiveDb(null)"

  # =============================================================================
  # BATCH 2 — P0 — Runner Entity + Physics Engine + Input Handler
  # Player sees: silhouette runner auto-scrolling, tap to jump arc, gravity pulls down
  # HOOK BATCH — first rewarding player experience
  # =============================================================================
  - id: 2
    name: "Runner + Physics + Input — tap to jump"
    priority: P0
    player_visible: "player taps screen; runner jumps with visible arc and gravity; double-tap gives second jump; hold >=200ms crouches runner"
    features: [runner-entity, physics-engine, input-handler]
    cos_covered: [core-interaction, animated-dynamics]
    ux_zones:
      thumb_zone: [center]
      touch_targets: [full-canvas]
      feedback_surfaces: [canvas, runner-sprite]
    acceptance:
      - given: "player taps screen for <200ms while runner is on ground"
        should: "runner jumps immediately (<100ms visual response); jump arc follows parabolic physics (gravity=2200px/s², jumpV=-900px/s); runner Y changes visibly"
      - given: "runner is airborne (jumpCount=1) and player taps <200ms"
        should: "double jump fires; jumpV=-700px/s; jumpCount becomes 2; no further jump available until landing"
      - given: "player holds tap >=200ms"
        should: "runner crouches (hitbox shrinks 50%); state=crouching; hold maintained for minimum 300ms"
      - given: "runner lands on a platform"
        should: "jumpCount resets to 0; state transitions to run-cycle; landing is animated (squash/settle via GSAP)"
      - given: "game state phase=dying"
        should: "all pointer input is blocked; no jump or crouch fires"
      - given: "pointer events fired on canvas container"
        should: "pointerdown/pointerup used (not touchstart/mousedown); touch-action:none set on canvas container"
      - given: "runner animates"
        should: "run-cycle frames play on ground; jump-pose frame shown airborne ascending; fall-pose frame shown descending"
    test_loci:
      - describe: "physics: gravity, jump, double-jump"
        file: "src/game/runbench/systems/PhysicsSystem.test.ts"
        cases:
          - "runner jumps immediately (<100ms visual response); jump arc follows parabolic physics (gravity=2200px/s², jumpV=-900px/s); runner Y changes visibly"
          - "double jump fires; jumpV=-700px/s; jumpCount becomes 2; no further jump available until landing"
          - "runner crouches (hitbox shrinks 50%); state=crouching; hold maintained for minimum 300ms"
          - "jumpCount resets to 0; state transitions to run-cycle; landing is animated (squash/settle via GSAP)"
      - describe: "input: tap/hold/block"
        file: "src/game/runbench/input/InputHandler.test.ts"
        cases:
          - "all pointer input is blocked; no jump or crouch fires"
          - "pointerdown/pointerup used (not touchstart/mousedown); touch-action:none set on canvas container"
    files:
      state:
        - src/game/runbench/state/RunBenchPlugin.ts
        - src/game/runbench/entities/Runner.ts
      integration:
        - src/game/runbench/systems/PhysicsSystem.ts
        - src/game/runbench/input/InputHandler.ts
        - src/game/runbench/GameController.ts
      test:
        - src/game/runbench/systems/PhysicsSystem.test.ts
        - src/game/runbench/input/InputHandler.test.ts
    how:
      - "Add Runner ECS components to RunBenchPlugin: position (x,y), velocity (vx,vy), jumpCount (0-2), state (idle|airborne|crouching|dying); X locked to 30% screen width (camera follows world, runner X is constant)"
      - "Implement PhysicsSystem.step(db, dt): apply gravity to vy each frame, integrate position, detect platform collision, reset jumpCount on landing, camera-lag Y tracking with 80ms lag; pure step() — no Math.random(), no Pixi"
      - "Implement InputHandler: pointerdown starts timer; pointerup <200ms = jump (dispatch action); pointerup >=200ms ends crouch; blocked when phase=dying; set touch-action:none on canvas container; use pointerdown/pointerup per core-interaction CoS (collision-resolved: pointer-event-model)"
    risk: HIGH
    risk_reason: "Dual-gesture tap/hold detection on 200ms threshold; misclassification causes wrong actions; physics multi-variable interaction (gravity, scroll speed, camera lag) must be deterministic"
    definition_of_done:
      - "acceptance[] tests go red then green"
      - "integration call site exists at files.integration (InputHandler registered in GameController; PhysicsSystem ticked in game loop)"
      - "every file in files.integration is exercised by at least one acceptance test"
      - "CoS sub-walk clean for cos_covered (core-interaction: pointer events, block during non-idle; animated-dynamics: jump arc animated, landing bounce via GSAP)"
      - "touch targets ≥ 44 px — full-canvas tap target satisfies this"
      - "input blocked during dying state confirmed by test"
      - "bun run build + bun test pass within 3 fix cycles"
      - "interaction-archetype.md written to src/game/runbench/ per core-interaction CoS exit criterion"

