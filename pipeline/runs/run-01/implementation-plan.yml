      - given: "results screen reads stored data"
        should: "localStorage keys 'runbench-best-distance', 'runbench-last-fps-avg', 'runbench-run-count' read correctly; first run shows best=0"
    test_loci:
      - describe: "death sequence: animation and state transition"
        file: "src/game/runbench/GameController.test.ts"
        cases:
          - "phase transitions to Dying immediately; all pointer input blocked; GSAP tween fires (alpha 1->0, scale 1->0.5, duration 0.3s, power2.in); tween killed before sprite destroyed per guardrail #2/#18"
          - "run snapshot recorded to localStorage (bestDistance, lastFpsAverage, runCount); canvas fades out (200ms GSAP alpha 0); goto('results') called"
      - describe: "runStorage: read/write localStorage"
        file: "src/game/runbench/storage/runStorage.test.ts"
        cases:
          - "localStorage keys 'runbench-best-distance', 'runbench-last-fps-avg', 'runbench-run-count' read correctly; first run shows best=0"
      - describe: "ResultsScreen: display values and navigation"
        file: "src/game/runbench/screens/ResultsScreen.test.tsx"
        cases:
          - "distance reached (meters, integer) displayed; best distance displayed (or 0 on first run); FPS average displayed; screen fades in after GPU teardown completes"
          - "goto('game') called; new run starts with runCount incremented; RETRY button tap target >=44px"
          - "goto('start') called; HOME button tap target >=44px; >=8px spacing between RETRY and HOME"
    files:
      state:
        - src/game/runbench/storage/runStorage.ts
      integration:
        - src/game/runbench/GameController.ts
        - src/game/runbench/renderers/RunnerRenderer.ts
        - src/game/screens/ResultsScreen.tsx
      test:
        - src/game/runbench/GameController.test.ts
        - src/game/runbench/storage/runStorage.test.ts
        - src/game/runbench/screens/ResultsScreen.test.tsx
    how:
      - "Add death sequence to GameController: on collision detection set phase=dying → block input → GSAP.to(runnerSprite, {alpha:0,pixi:{scaleX:0.5,scaleY:0.5},duration:0.3,ease:'power2.in',onComplete: async () => { runStorage.save(finalDistance,fpsAverage); await GSAP.to(gameContainer,{alpha:0,duration:0.2}); goto('results'); }}); kill tweens before sprite destroy"
