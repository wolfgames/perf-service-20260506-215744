          - "tutorial corridor loads: 3 wide Normal platforms (width=256px), gaps=48px, no obstacles, duration covers first 10 seconds of scroll"
          - "procedural generation used from start; mulberry32 PRNG seeded with runNumber*48271+deviceId_hash"
