        should: "phase transitions to Dying immediately; all pointer input blocked; GSAP tween fires (alpha 1->0, scale 1->0.5, duration 0.3s, power2.in); tween killed before sprite destroyed per guardrail #2/#18"
      - given: "death tween completes"
        should: "run snapshot recorded to localStorage (bestDistance, lastFpsAverage, runCount); canvas fades out (200ms GSAP alpha 0); goto('results') called"
