# Aliases — concrete values substituted into the glossary template at dispatch
# time so sub-agents never guess paths or detect runners. Populated by:
#   initRun()     — runDir, pass, skillRoot, repoRoot, rules, tsRunner
#   05-pass-gate  — previousRunLog
#   10-prime      — buildCmd, testCmd
# Derived aliases ($pipelineRoot, $phasesDir, $refs, …) are computed from these
# anchors inside $refs/templates/glossary.tpl.md — they are NOT duplicated here.
aliases:
  runDir: /var/lib/agent-worker/workspace/perf-service-20260506-215744/pipeline/runs/run-01
  pass: core
  skillRoot: /var/lib/agent-worker/workspace/perf-service-20260506-215744/node_modules/@wolfgames/cortex/amino/skills/pipeline-build-game
  repoRoot: /var/lib/agent-worker/workspace/perf-service-20260506-215744
  rules: /var/lib/agent-worker/workspace/perf-service-20260506-215744/.claude/rules
  tsRunner: bun
  previousRunLog: null
  buildCmd: "bun run build"
  testCmd: "bun test"

# Pass context — mirrored by phase 10 (prime) from $runLog.pass and
# $phaseSummary.pass_gate.previous_pass_stable.
pass: core
previous_pass_stable: null   # null = core run, no N-1 to check

# Stack — detected by 10-prime from the host project.
stack:
  renderer: "pixi"
  ui: "solidjs"
  bundler: "vite"
  runtime: "bun"
  testing: "vitest"
  animation: "gsap"
  build_cmd: "bun run build"
  test_cmd: "bun test"
  summary: "pixi + solidjs + gsap + bun (vite, vitest)"

# Paths — detected by 10-prime from the host project layout.
paths:
  tests: "tests/"
  modules: "src/modules/"
  core: "src/core/"
  game: "src/game/"
  docs: "docs/"

existing-features: []
# mygame/ is a pure greenfield stub — no game features implemented yet.
# gameController.ts is DOM-mode placeholder; startView.ts is DOM stub.

dom-overlays:
  - element: Logo
    file: src/game/screens/GameScreen.tsx
    position: bottom
    height-px: 32
    css: "absolute bottom-8 left-1/2 -translate-x-1/2"
  - element: PauseOverlay
    file: src/game/screens/GameScreen.tsx
    position: overlay
    height-px: 0
    css: "core-managed overlay, no fixed height"

