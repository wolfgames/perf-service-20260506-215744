# CONFLICTS
# ---------------------------------------------------------------------------

conflicts: []
# No conflict features — all features are new or content-gap on a greenfield project.

# ---------------------------------------------------------------------------
# RISK AREAS
# ---------------------------------------------------------------------------

risk_areas:

  - feature: game-controller-pixi
    reason: >
      Central integration point for Pixi init, ECS wiring, input routing, renderer lifecycle,
      and viewport layout. Every other runtime feature depends on this. Destruction order is
      complex (GSAP → Pixi → ECS bridge → setActiveDb(null)). Failure here blocks all gameplay.

  - feature: input-handler
    reason: >
      Dual-gesture detection (tap vs tap-and-hold with 200ms threshold) on a single pointer
      stream. Misclassification silently causes wrong actions (crouch fired as jump or vice versa).
      Input must be blocked during Dying state. Mobile pointer-event discipline (touch-action: none,
      pointer capture) critical for cross-platform correctness.

  - feature: physics-engine
    reason: >
      Multi-variable physics (gravity, scroll speed, camera lag, moving-platform inheritance)
      interact non-linearly. Determinism requirement (seeded PRNG, reproducible runs) constrains
      implementation. Solvability checker must simulate physics accurately or generate unbeatable chunks.

# ---------------------------------------------------------------------------
# WARNINGS (collisions detected)
# ---------------------------------------------------------------------------

warnings:
  - "collision:pointer-event-model — gdd=touchstart/mousedown (per-platform split) vs skill=pointerdown/pointerup (core-interaction.md + mobile-constraints.mdc) — critical"
  - "collision:screen-id:run-over — gdd='Run Over Screen' (implied new ID) vs scaffold=results (valid IDs: loading|start|game|results, precedence.md) — critical"

# ---------------------------------------------------------------------------
# OPEN QUESTIONS
# ---------------------------------------------------------------------------

open_questions:

  - question: "What are the FPS thresholds that define performance tiers (shown as a badge on Title Screen)?"
    context: >
      GDD says 'performance tier badge (if run count > 0)' but does not define tier boundaries.
      Affects perf-tracking and start-screen features. Plan must either define thresholds or
      leave badge label as 'Unknown tier' until secondary pass.

  - question: "Does the PauseOverlay (scaffold-managed, present in GameScreen.tsx) need to be suppressed or left inert for RunBench?"
    context: >
      GDD explicitly states 'no pause button by design (performance test context)'.
      PauseOverlay is a scaffold core component (src/core/ui/) — guardrail #8 forbids modifying src/core/.
      Plan must decide: suppress pause trigger in game state, or leave PauseOverlay rendered but never triggered.

  - question: "How should deviceId_hash be computed for the run seed formula?"
    context: >
      GDD specifies 'runSeed = runNumber * 48271 + deviceId_hash' but does not define deviceId_hash.
      Options: hash of User-Agent string, hash of canvas fingerprint, or a random value persisted
      to localStorage on first visit. Plan must choose an approach that is deterministic per device.
